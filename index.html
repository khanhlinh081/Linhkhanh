<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Khanh Linh Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
scroll-behavior:smooth;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

/* particles */

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

/* navbar */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 10%;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
transition:.3s;
}

nav a:hover{
color:#38bdf8;
}

/* hero */

.hero{
min-height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.avatar{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
margin-bottom:20px;
border:3px solid #38bdf8;
}

.hero h1{
font-size:60px;
background:linear-gradient(90deg,#38bdf8,#a78bfa);
-webkit-background-clip:text;
color:transparent;
}

.hero span{
color:#38bdf8;
}

.hero p{
margin-top:10px;
font-size:20px;
opacity:.8;
}

/* button */

.btn{
margin-top:25px;
padding:12px 30px;
background:#6366f1;
border-radius:30px;
text-decoration:none;
color:white;
font-weight:600;
transition:.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* sections */

.section{
padding:80px 10%;
}

.section h2{
text-align:center;
margin-bottom:40px;
}

/* skills */

.skills{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
}

.skills img{
width:60px;
transition:.3s;
}

.skills img:hover{
transform:scale(1.3);
}

/* projects */

.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:25px;
border-radius:15px;
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card a{
color:#38bdf8;
text-decoration:none;
}

/* contact */

.contact{
text-align:center;
}

.socials{
margin-top:20px;
}

.socials a{
margin:10px;
font-size:22px;
color:white;
text-decoration:none;
}

/* footer */

footer{
text-align:center;
padding:40px;
opacity:.6;
}

/* mobile */

@media(max-width:768px){

.hero h1{
font-size:40px;
}

.avatar{
width:120px;
height:120px;
}

}

</style>

</head>

<body>

<div id="particles-js"></div>

<nav>

<h3>Khanh Linh</h3>

<div>
<a href="#">Home</a>
<a href="#skills">Skills</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</div>

</nav>

<!-- HERO -->

<section class="hero">

<img src="avatar.jpg" class="avatar">

<h1>Khanh Linh</h1>

<p>I am a <span id="typing"></span></p>

<a class="btn" href="https://github.com/khanhlinh081">Visit My GitHub</a>

</section>

<!-- SKILLS -->

<section class="section" id="skills">

<h2>Skills</h2>

<div class="skills">

<img src="https://skillicons.dev/icons?i=python">
<img src="https://skillicons.dev/icons?i=git">
<img src="https://skillicons.dev/icons?i=github">
<img src="https://skillicons.dev/icons?i=html">
<img src="https://skillicons.dev/icons?i=css">
<img src="https://skillicons.dev/icons?i=js">

</div>

</section>

<!-- PROJECTS -->

<section class="section" id="projects">

<h2>Projects</h2>

<div class="projects" id="projects-container"></div>

</section>

<!-- STATS -->

<section class="section">

<h2>GitHub Stats</h2>

<p style="text-align:center">

<img src="https://github-readme-stats.vercel.app/api?username=khanhlinh081&show_icons=true&theme=tokyonight">

<br><br>

<img src="https://github-readme-streak-stats.herokuapp.com/?user=khanhlinh081&theme=tokyonight">

</p>

</section>

<!-- CONTACT -->

<section class="section contact" id="contact">

<h2>Contact</h2>

<p>Email: yourmail@gmail.com</p>

<div class="socials">

<a href="https://github.com/khanhlinh081">GitHub</a>

</div>

</section>

<footer>

© 2026 Khanh Linh

</footer>

<script>

/* typing */

const text=["Data Analyst","Business Student","Machine Learning Learner"]

let count=0
let index=0

function type(){

let current=text[count]

document.getElementById("typing").textContent=current.slice(0,++index)

if(index===current.length){
count++
index=0
}

if(count===text.length){
count=0
}

setTimeout(type,120)

}

type()

/* particles */

particlesJS("particles-js",{
particles:{
number:{value:80},
size:{value:3},
move:{speed:2}
}
})

/* github projects */

const username="khanhlinh081"

fetch(`https://api.github.com/users/${username}/repos`)
.then(res=>res.json())
.then(data=>{

const container=document.getElementById("projects-container")

data.slice(0,6).forEach(repo=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`
<h3>${repo.name}</h3>
<p>${repo.description || "GitHub Project"}</p>
<a href="${repo.html_url}" target="_blank">View Project</a>
`

container.appendChild(card)

})

})

</script>

</body>
</html>
